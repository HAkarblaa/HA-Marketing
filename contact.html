<style>
body{
    font-family:Arial;
    direction:rtl;
    margin:0;
    background:#fff;
}

.service-form{
    width:100%;
    max-width:900px;
    margin:40px auto;
}

.service-form h1{
    text-align:center;
    font-size:40px;
    margin-bottom:30px;
}

.service-form input,
.service-form textarea,
.service-form button{
    width:100%;
    box-sizing:border-box;
    padding:20px;
    margin:15px 0;
    font-size:20px;
    border:1px solid #ccc;
    border-radius:10px;
}

.service-form textarea{
    height:220px;
    resize:vertical;
}

.service-form button{
    background:#000;
    color:#fff;
    border:none;
    cursor:pointer;
    font-size:22px;
    font-weight:bold;
}
</style>


<div class="service-form">

<h1>طلب خدمة</h1>

<form action="https://formspree.io/f/mwvgeqwk" method="POST">

<input type="text" name="name" placeholder="الاسم الكامل (اختياري)">

<input type="text" name="phone" placeholder="رقم الهاتف (إجباري)" required>

<input type="text" name="location" placeholder="اسم المنطقة (إجباري)" required>

<input type="text" name="service" placeholder="نوع الخدمة (اختياري)">

<input type="file" name="file" accept="image/*,video/*">

<p style="font-size:14px; color:#666; margin-top:5px; margin-bottom:15px;">
إضافة صورة أو فيديو (اختياري)
</p>

<textarea name="message" placeholder="اكتب تفاصيل الطلب (اختياري)"></textarea>

<button type="submit">إرسال الطلب</button>

</form>

</div>
